name: Sync Google Drive Images

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-api-python-client google-auth

      - name: Create Google credentials file
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service-account.json

      - name: Sync images from Google Drive
        run: python scripts/sync_drive.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add images/ images_map.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync images from Google Drive"
            git push
          fi
