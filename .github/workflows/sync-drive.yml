import os
import io
import re
import unicodedata
import shutil

from google.oauth2 import service_account
from googleapiclient.discovery import build
from googleapiclient.http import MediaIoBaseDownload


# 🔥 CONFIGURAÇÕES
FOLDER_ID = "1gHH_jC3MiCpyJjtXGki4vDkzYDhLroj0"
DEST_FOLDER = "images"


# 🔥 FUNÇÃO DE LIMPEZA
def limpar(texto):
    texto = unicodedata.normalize("NFKD", texto)
    texto = texto.encode("ascii", "ignore").decode("ascii")
    texto = texto.lower()
    texto = re.sub(r"[^a-z0-9]+", "-", texto)
    return texto.strip("-")


# 🔥 PADRONIZA NOME FINAL
def gerar_nome(nome):
    nome, ext = os.path.splitext(nome)
    ext = ext.lower()

    nome = limpar(nome)

    return f"perfume-{nome}{ext}"


# 🔐 AUTENTICAÇÃO
creds = service_account.Credentials.from_service_account_file(
    "service-account.json",
    scopes=["https://www.googleapis.com/auth/drive.readonly"]
)

service = build("drive", "v3", credentials=creds)


# 🔍 BUSCA ARQUIVOS
query = f"'{FOLDER_ID}' in parents and trashed = false"

results = service.files().list(
    q=query,
    fields="files(id, name, mimeType)"
).execute()

files = results.get("files", [])


# 🧹 LIMPA PASTA (ANTI-DUPLICAÇÃO)
if os.path.exists(DEST_FOLDER):
    shutil.rmtree(DEST_FOLDER)

os.makedirs(DEST_FOLDER, exist_ok=True)


print("🚀 Iniciando download das imagens...\n")


# 📥 DOWNLOAD
for file in files:
    mime = file.get("mimeType", "")

    # 🚫 ignora não imagem
    if not mime.startswith("image/"):
        print(f"⛔ Ignorado (não imagem): {file['name']}")
        continue

    file_id = file["id"]
    nome_original = file["name"]

    nome_final = gerar_nome(nome_original)
    filepath = os.path.join(DEST_FOLDER, nome_final)

    request = service.files().get_media(fileId=file_id)

    with io.FileIO(filepath, "wb") as fh:
        downloader = MediaIoBaseDownload(fh, request)
        done = False

        while not done:
            _, done = downloader.next_chunk()

    print(f"✅ Baixado: {filepath}")


print("\n🔥 Sync finalizado com sucesso!")
